<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Production E-Commerce Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 1.6rem; }
    #products { margin-top: 20px; }
    .product { border: 1px solid #e2e2e2; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; }
    .meta { color: #666; font-size: 0.85rem; margin-top: 20px; }
    button { padding: 8px 14px; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Production Cloud Infrastructure — E-Commerce Demo</h1>
  <p>Frontend container served by Nginx, talking to the Backend API through the reverse proxy.</p>
  <button onclick="loadProducts()">Load Products</button>
  <div id="products"></div>
  <div class="meta" id="meta"></div>

  <script>
    async function loadProducts() {
      const el = document.getElementById('products');
      const meta = document.getElementById('meta');
      el.innerHTML = 'Loading...';
      try {
        const res = await fetch('/api/products');
        const json = await res.json();
        el.innerHTML = json.data.map(p =>
          `<div class="product"><strong>${p.name}</strong> — $${p.price} (stock: ${p.stock})</div>`
        ).join('');
        meta.textContent = `source: ${json.source} | served by: ${json.instance}`;
      } catch (err) {
        el.innerHTML = 'Failed to load products.';
      }
    }
  </script>
</body>
</html>
