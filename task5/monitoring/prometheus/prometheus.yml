global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus scraping itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API application metrics (/metrics endpoint via prom-client)
  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend_1:8080', 'backend_2:8080']

  # Host-level metrics: CPU, RAM, disk, network
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Per-container metrics: CPU, memory, network per Docker container
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
