# Upstream backend pool — load balanced across two replicas for zero-downtime deploys
upstream backend_pool {
    least_conn;
    server backend_1:8080 max_fails=3 fail_timeout=10s;
    server backend_2:8080 max_fails=3 fail_timeout=10s;
}

upstream frontend_pool {
    server frontend:80;
}

# Basic response caching for static/API GET responses
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 256;
gzip_comp_level 5;

server {
    listen 80;
    server_name _;

    # ---------- Frontend ----------
    location / {
        proxy_pass http://frontend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=300";
    }

    # ---------- Backend API ----------
    location /api/ {
        proxy_pass http://backend_pool/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 10s;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # ---------- Backend health check passthrough ----------
    location /health {
        proxy_pass http://backend_pool/health;
        access_log off;
    }

    # ---------- Nginx's own health endpoint ----------
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
